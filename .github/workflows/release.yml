name: Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements-build.txt

      - name: Read app version
        shell: powershell
        run: |
          $version = (Get-Content .\VERSION -Raw).Trim()
          "APP_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build release bundle
        shell: powershell
        run: powershell -ExecutionPolicy Bypass -File .\build_release.ps1

      - name: Publish GitHub Release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.APP_VERSION }}
          name: v${{ env.APP_VERSION }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: release/*.zip
